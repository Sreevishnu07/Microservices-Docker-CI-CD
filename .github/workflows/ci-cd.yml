name: Full CI-CD pipeline

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: my_db
        ports:
          - "3306:3306"
        options: >-
          --health-cmd="mysqladmin ping -h localhost -proot"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        working-directory: ./backend
        run: npm install

      - name: Install MySql Client
        run: sudo apt-get update && sudo apt-get install -y mysql-client
  
      - name: Wait for MySql
        run: |
          for i in {1..10}; do
            mysqladmin ping -h 127.0.0.1 -proot && break
            echo "Waiting for mysql.."
            sleep 3
          done

      - name: Run Backend
        working-directory: ./backend
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root
          DB_NAME: my_db
        run: |
          node app.js &
          sleep 5

      - name: Test api
        run: |
          curl -f http://localhost:5000/api/data

  build-and-push:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build frontend image
        working-directory: ./frontend
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/frontend:1.0 .

      - name: Build backend image
        working-directory: ./backend
        run: docker build -t ${{secrets.DOCKER_USERNAME}}/backend:1.0 .

      - name: Docker login
        run: echo "${{secrets.DOCKER_PASSWORD}}" | docker login -u ${{secrets.DOCKER_USERNAME}} --password-stdin

      - name: Push frontend
        run: docker push ${{secrets.DOCKER_USERNAME}}/frontend:1.0 

      - name: Push backend
        run: docker push ${{secrets.DOCKER_USERNAME}}/backend:1.0
